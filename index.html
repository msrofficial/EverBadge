<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReleaseDownload Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { border-bottom: 2px solid #38bdf8; color: #38bdf8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loginSection" class="glass p-10 rounded-2xl shadow-2xl w-full max-w-md text-center">
        <i class="fa-solid fa-server text-5xl text-sky-400 mb-4 drop-shadow-md"></i>
        <h2 class="text-3xl font-bold mb-6 tracking-tight">Admin Portal</h2>
        <input type="password" id="password" placeholder="Master Password" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-sky-500 outline-none mb-4 transition text-center tracking-widest">
        <button onclick="login()" id="loginBtn" class="w-full bg-sky-500 hover:bg-sky-600 text-slate-900 font-bold py-3 rounded-xl transition shadow-[0_0_15px_rgba(56,189,248,0.3)]">Authenticate</button>
        <p id="errorMsg" class="text-rose-400 mt-4 text-sm hidden font-medium">Access Denied!</p>
    </div>

    <div id="dashboardSection" class="glass rounded-2xl shadow-2xl w-full max-w-4xl hidden flex-col overflow-hidden">
        
        <div class="border-b border-slate-700 bg-slate-800/50 px-8 py-4 flex justify-between items-center">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-brands fa-github text-sky-400"></i> ReleaseDownload Tracker
            </h2>
            <div class="flex gap-6 font-semibold text-sm">
                <button onclick="switchTab('stats')" id="tab-stats" class="pb-1 tab-active transition">Live Stats</button>
                <button onclick="switchTab('generate')" id="tab-generate" class="pb-1 text-slate-400 hover:text-white transition">Add New Repo</button>
            </div>
        </div>

        <div class="p-8">
            <div id="view-stats">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg text-slate-300">Tracked Repositories</h3>
                    <button onclick="fetchStats()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded transition"><i class="fa-solid fa-rotate-right mr-1"></i> Refresh</button>
                </div>
                <div class="overflow-x-auto rounded-xl border border-slate-700">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-800 text-slate-300">
                            <tr>
                                <th class="p-4">Repository</th>
                                <th class="p-4">Base (Lost)</th>
                                <th class="p-4">Live GitHub</th>
                                <th class="p-4 text-sky-400 font-bold">Total Downloads</th>
                            </tr>
                        </thead>
                        <tbody id="statsTableBody" class="divide-y divide-slate-700/50 bg-slate-900/50">
                            <tr><td colspan="4" class="p-4 text-center text-slate-500">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="view-generate" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block mb-2 text-sm font-semibold text-slate-300">GitHub Username</label>
                        <input type="text" id="username" placeholder="e.g. torvalds" class="w-full px-4 py-2.5 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-sky-500 outline-none">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-semibold text-slate-300">Repository Name</label>
                        <input type="text" id="repo" placeholder="e.g. linux" class="w-full px-4 py-2.5 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-sky-500 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block mb-2 text-sm font-semibold text-slate-300">Lost Downloads (Initial Base)</label>
                        <input type="number" id="base" placeholder="Optional: e.g. 5000" class="w-full px-4 py-2.5 rounded-lg bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-emerald-500 outline-none">
                        <p class="text-xs text-slate-500 mt-1">Leave empty if new repo. The system will auto-update this if files are replaced later!</p>
                    </div>
                </div>

                <button onclick="generateBadge()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 rounded-xl transition shadow-[0_0_15px_rgba(16,185,129,0.2)] mb-4">Generate Automated Link</button>

                <div id="resultArea" class="hidden bg-slate-950 p-4 rounded-xl border border-slate-700 text-center">
                    <p class="text-xs text-slate-400 mb-2">Markdown Code (Copy to README):</p>
                    <code id="output" class="text-emerald-400 text-sm block mb-3 break-all p-2 bg-slate-900 rounded"></code>
                </div>
            </div>
        </div>
    </div>

    <script>
        let adminPass = '';

        async function login() {
            const passInput = document.getElementById('password').value;
            document.getElementById('loginBtn').innerText = "Checking...";
            
            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: passInput })
                });

                if (res.ok) {
                    adminPass = passInput;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    document.getElementById('dashboardSection').classList.add('flex');
                    fetchStats(); 
                } else {
                    document.getElementById('errorMsg').classList.remove('hidden');
                    document.getElementById('loginBtn').innerText = "Authenticate";
                }
            } catch (err) { alert("Network Error"); }
        }

        function switchTab(tab) {
            document.getElementById('view-stats').classList.add('hidden');
            document.getElementById('view-generate').classList.add('hidden');
            document.getElementById('tab-stats').classList.remove('tab-active', 'text-sky-400');
            document.getElementById('tab-stats').classList.add('text-slate-400');
            document.getElementById('tab-generate').classList.remove('tab-active', 'text-sky-400');
            document.getElementById('tab-generate').classList.add('text-slate-400');

            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active', 'text-sky-400');
            document.getElementById(`tab-${tab}`).classList.remove('text-slate-400');
            
            if(tab === 'stats') fetchStats();
        }

        async function fetchStats() {
            const tbody = document.getElementById('statsTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Fetching Live Data...</td></tr>';
            
            try {
                const res = await fetch('/api/stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: adminPass })
                });
                const response = await res.json();
                
                if (response.success && response.data.length > 0) {
                    tbody.innerHTML = response.data.map(repo => `
                        <tr class="hover:bg-slate-800/50 transition">
                            <td class="p-4 font-semibold text-white">${repo.username}/${repo.repository}</td>
                            <td class="p-4 text-slate-400">${repo.baseCount}</td>
                            <td class="p-4 text-slate-400">${repo.lastLiveCount}</td>
                            <td class="p-4 text-sky-400 font-bold text-lg">${repo.totalDownloads.toLocaleString()}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-500">No repositories tracked yet. Generate a badge first!</td></tr>';
                }
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-rose-400">Error loading data.</td></tr>';
            }
        }

        function generateBadge() {
            const user = document.getElementById('username').value.trim();
            const repo = document.getElementById('repo').value.trim();
            const base = document.getElementById('base').value || 0;
            const host = window.location.origin;

            if(!user || !repo) return alert("Please enter Username and Repo Name!");

            const apiUrl = `${host}/api/badge?user=${encodeURIComponent(user)}&repo=${encodeURIComponent(repo)}&base=${base}`;
            const markdown = `![Downloads](https://img.shields.io/endpoint?url=${encodeURIComponent(apiUrl)})`;
            
            document.getElementById('output').innerText = markdown;
            document.getElementById('resultArea').classList.remove('hidden');
        }

        document.getElementById("password").addEventListener("keypress", e => { if (e.key === "Enter") login(); });
    </script>
</body>
</html>
